services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilao-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.prod
    environment:
      - PORT=3001
      - NODE_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: leilao-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    env_file:
      - .env.prod
